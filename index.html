<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>明工作室 | MING STUDIO</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#faf9f7;--fg:#1a1a1a;--gold:#c9a962;--muted:#888;--border:#e5e5e5}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--fg);overflow-x:hidden}
::-webkit-scrollbar{width:0;height:0}
.loader{position:fixed;inset:0;background:var(--fg);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.8s ease,visibility 0.8s}
.loader.hidden{opacity:0;visibility:hidden;pointer-events:none}
.loader-text{font-family:'Cormorant Garamond',serif;font-size:3rem;color:var(--gold);letter-spacing:0.3em;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.cursor{width:40px;height:40px;border:1px solid var(--gold);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transition:transform 0.15s ease;transform:translate(-50%,-50%);mix-blend-mode:difference}
.cursor.hover{transform:translate(-50%,-50%) scale(1.5);border-color:#fff}
.nav{position:fixed;top:0;left:0;right:0;padding:2rem 4rem;display:flex;justify-content:space-between;align-items:center;z-index:100;mix-blend-mode:difference}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.2rem;letter-spacing:0.2em;color:#fff;text-decoration:none}
.nav-links{display:flex;gap:2rem}
.nav-links a{color:#fff;text-decoration:none;font-size:0.85rem;letter-spacing:0.1em;transition:opacity 0.3s}
.nav-links a:hover{opacity:0.6}
.hero{height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 4rem 6rem;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:var(--fg);z-index:-1}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(5rem,18vw,14rem);font-weight:300;letter-spacing:0.05em;line-height:0.85;color:#fff;opacity:0;transform:translateY(80px);animation:fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) forwards;animation-delay:0.3s}
.hero-sub{font-size:0.85rem;color:rgba(255,255,255,0.5);letter-spacing:0.3em;text-transform:uppercase;margin-top:1.5rem;opacity:0;animation:fadeUp 1s ease forwards;animation-delay:0.8s}
.hero-scroll{position:absolute;bottom:3rem;right:4rem;font-size:0.75rem;letter-spacing:0.2em;color:rgba(255,255,255,0.4);writing-mode:vertical-rl;opacity:0;animation:fadeUp 1s ease forwards;animation-delay:1.2s}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.works{padding:8rem 4rem}
.section-label{font-size:0.75rem;letter-spacing:0.3em;color:var(--muted);text-transform:uppercase;margin-bottom:1rem}
.section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,6vw,4rem);font-weight:300;margin-bottom:4rem}
.works-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:1.5rem}
.work-item{position:relative;overflow:hidden;cursor:pointer;background:var(--border)}
.work-item:nth-child(1){grid-column:span 7;aspect-ratio:16/10}
.work-item:nth-child(2){grid-column:span 5;aspect-ratio:4/5}
.work-item:nth-child(3){grid-column:span 5;aspect-ratio:4/5}
.work-item:nth-child(4){grid-column:span 7;aspect-ratio:16/10}
.work-item:nth-child(5){grid-column:span 12;aspect-ratio:21/9}
.work-item:nth-child(n+6){grid-column:span 6;aspect-ratio:4/3}
.work-item img{width:100%;height:100%;object-fit:cover;transition:transform 0.8s cubic-bezier(0.16,1,0.3,1)}
.work-item:hover img{transform:scale(1.06)}
.work-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.8) 0%,transparent 60%);opacity:0;transition:opacity 0.4s ease;display:flex;flex-direction:column;justify-content:flex-end;padding:2rem}
.work-item:hover .work-overlay{opacity:1}
.work-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:#fff;transform:translateY(15px);transition:transform 0.4s ease}
.work-item:hover .work-title{transform:translateY(0)}
.work-cat{font-size:0.75rem;letter-spacing:0.2em;color:var(--gold);margin-top:0.3rem;transform:translateY(15px);transition:transform 0.4s ease 0.05s}
.work-item:hover .work-cat{transform:translateY(0)}
.modal{position:fixed;inset:0;z-index:1000;opacity:0;visibility:hidden;transition:all 0.4s ease}
.modal.active{opacity:1;visibility:visible}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,0.95);cursor:pointer}
.modal-content{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column}
.modal-header{padding:2rem 4rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.1)}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:2rem;color:#fff}
.modal-cat{font-size:0.75rem;letter-spacing:0.2em;color:var(--gold)}
.modal-close{width:48px;height:48px;border:1px solid rgba(255,255,255,0.3);border-radius:50%;background:none;color:#fff;font-size:1.2rem;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:rgba(255,255,255,0.1)}
.modal-body{flex:1;overflow-y:auto;padding:3rem 4rem}
.modal-images{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem}
.modal-images img{width:100%;height:250px;object-fit:cover;transition:transform 0.3s}
.modal-images img:hover{transform:scale(1.02)}
.footer{background:var(--fg);color:#fff;padding:4rem;text-align:center}
.footer-logo{font-family:'Cormorant Garamond',serif;font-size:2.5rem;letter-spacing:0.2em;margin-bottom:1rem;color:var(--gold)}
.footer-text{font-size:0.85rem;color:rgba(255,255,255,0.4);letter-spacing:0.1em}
.reveal{opacity:0;transform:translateY(40px);transition:opacity 0.8s ease,transform 0.8s ease}
.reveal.visible{opacity:1;transform:translateY(0)}
@media(max-width:768px){.nav{padding:1.5rem 2rem}.hero{padding:0 2rem 4rem}.works{padding:4rem 2rem}.works-grid{grid-template-columns:1fr}.work-item:nth-child(n){grid-column:span 1;aspect-ratio:4/3}.modal-header{padding:1.5rem 2rem}.modal-body{padding:1.5rem 2rem}.cursor{display:none}}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="loader-text">MING</div></div>
<div class="cursor" id="cursor"></div>
<nav class="nav"><a href="#" class="nav-logo">MING STUDIO</a><div class="nav-links"><a href="#works">作品</a><a href="#about">关于</a></div></nav>
<section class="hero"><div class="hero-bg"></div><h1 class="hero-title">明工作室</h1><p class="hero-sub">平面设计 · 摄影 · 视觉创意</p><div class="hero-scroll">SCROLL</div></section>
<section class="works" id="works"><div class="reveal"><div class="section-label">Selected Works</div><h2 class="section-title">精选作品</h2></div><div class="works-grid" id="worksGrid"></div></section>
<footer class="footer" id="about"><div class="footer-logo">MING</div><div class="footer-text">© 2024 明工作室 · All Rights Reserved</div></footer>
<div class="modal" id="modal"><div class="modal-bg" onclick="closeModal()"></div><div class="modal-content"><div class="modal-header"><div><div class="modal-cat" id="modalCat"></div><div class="modal-title" id="modalTitle"></div></div><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div class="modal-images" id="modalImages"></div></div></div></div>
<script>
const PROJECTS = [{"id": "photography", "title": "摄影", "category": "摄影", "cover": "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/photography/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260330172126_133_66.jpg", "images": ["https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/photography/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260330172126_133_66.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/photography/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260330172128_134_66.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/photography/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260330172129_135_66.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/photography/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260330172130_136_66.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/photography/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260330172133_138_66.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/photography/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260330172134_139_66.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/photography/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260330172135_140_66.jpg"]}, {"id": "木制拖拉小狗_jpg", "title": "木制拖拉小狗", "category": "平面设计", "cover": "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E6%9C%A8%E5%88%B6%E6%8B%96%E6%8B%89%E5%B0%8F%E7%8B%97_jpg/10.jpg", "images": ["https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E6%9C%A8%E5%88%B6%E6%8B%96%E6%8B%89%E5%B0%8F%E7%8B%97_jpg/10.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E6%9C%A8%E5%88%B6%E6%8B%96%E6%8B%89%E5%B0%8F%E7%8B%97_jpg/14.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E6%9C%A8%E5%88%B6%E6%8B%96%E6%8B%89%E5%B0%8F%E7%8B%97_jpg/4.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E6%9C%A8%E5%88%B6%E6%8B%96%E6%8B%89%E5%B0%8F%E7%8B%97_jpg/5.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E6%9C%A8%E5%88%B6%E6%8B%96%E6%8B%89%E5%B0%8F%E7%8B%97_jpg/7.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E6%9C%A8%E5%88%B6%E6%8B%96%E6%8B%89%E5%B0%8F%E7%8B%97_jpg/9.jpg"]}, {"id": "青蛙马克杯成品", "title": "青蛙马克杯", "category": "平面设计", "cover": "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E9%9D%92%E8%9B%99%E9%A9%AC%E5%85%8B%E6%9D%AF%E6%88%90%E5%93%81/%E4%B8%BB%E5%9B%BE9.jpg", "images": ["https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E9%9D%92%E8%9B%99%E9%A9%AC%E5%85%8B%E6%9D%AF%E6%88%90%E5%93%81/%E4%B8%BB%E5%9B%BE9.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E9%9D%92%E8%9B%99%E9%A9%AC%E5%85%8B%E6%9D%AF%E6%88%90%E5%93%81/%E5%8C%85%E8%A3%85%E5%9B%BE2-1.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E9%9D%92%E8%9B%99%E9%A9%AC%E5%85%8B%E6%9D%AF%E6%88%90%E5%93%81/%E5%9C%BA%E6%99%AF%E5%9B%BE10.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E9%9D%92%E8%9B%99%E9%A9%AC%E5%85%8B%E6%9D%AF%E6%88%90%E5%93%81/%E5%9C%BA%E6%99%AF%E5%9B%BE8.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E9%9D%92%E8%9B%99%E9%A9%AC%E5%85%8B%E6%9D%AF%E6%88%90%E5%93%81/%E6%A8%A1%E7%89%B9%E5%9B%BE1.jpg"]}, {"id": "鸡舍A+", "title": "鸡舍A+", "category": "平面设计", "cover": "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E9%B8%A1%E8%88%8DA%2B/%E7%94%BB%E6%9D%BF%201.jpg", "images": ["https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E9%B8%A1%E8%88%8DA%2B/%E7%94%BB%E6%9D%BF%201.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E9%B8%A1%E8%88%8DA%2B/%E7%94%BB%E6%9D%BF%2010.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E9%B8%A1%E8%88%8DA%2B/%E7%94%BB%E6%9D%BF%202.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E9%B8%A1%E8%88%8DA%2B/%E7%94%BB%E6%9D%BF%203.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E9%B8%A1%E8%88%8DA%2B/%E7%94%BB%E6%9D%BF%204.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E9%B8%A1%E8%88%8DA%2B/%E7%94%BB%E6%9D%BF%205.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E9%B8%A1%E8%88%8DA%2B/%E7%94%BB%E6%9D%BF%206.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E9%B8%A1%E8%88%8DA%2B/%E7%94%BB%E6%9D%BF%207.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E9%B8%A1%E8%88%8DA%2B/%E7%94%BB%E6%9D%BF%208.jpg", "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/%E9%B8%A1%E8%88%8DA%2B/%E7%94%BB%E6%9D%BF%209.jpg"]}, {"id": "jishe_long", "title": "鸡舍长图", "category": "平面设计", "cover": "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/jishe_long/%E9%B8%A1%E8%88%8D%E9%95%BF%E5%9B%BEA%2B.jpg", "images": ["https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/jishe_long/%E9%B8%A1%E8%88%8D%E9%95%BF%E5%9B%BEA%2B.jpg"]}, {"id": "qingwa_bei", "title": "青蛙杯", "category": "平面设计", "cover": "https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/qingwa_bei/%E9%9D%92%E8%9B%99%E6%9D%AF%E5%9B%BE%E6%96%87%E7%89%88%281%29-%E5%B0%81%E9%9D%A2.jpg", "images": ["https://raw.githubusercontent.com/z1832698917/ming-studio-pro/main/images/qingwa_bei/%E9%9D%92%E8%9B%99%E6%9D%AF%E5%9B%BE%E6%96%87%E7%89%88%281%29-%E5%B0%81%E9%9D%A2.jpg"]}];
window.addEventListener('load', () => { setTimeout(() => document.getElementById('loader').classList.add('hidden'), 1200); });
const cursor = document.getElementById('cursor');
if (window.innerWidth > 768) {
  document.addEventListener('mousemove', e => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });
  document.querySelectorAll('a, .work-item, button').forEach(el => { el.addEventListener('mouseenter', () => cursor.classList.add('hover')); el.addEventListener('mouseleave', () => cursor.classList.remove('hover')); });
}
const grid = document.getElementById('worksGrid');
PROJECTS.forEach((p, i) => {
  const div = document.createElement('div');
  div.className = 'work-item reveal';
  div.innerHTML = '<img src="' + p.cover + '" alt="' + p.title + '" loading="lazy"><div class="work-overlay"><div class="work-title">' + p.title + '</div><div class="work-cat">' + p.category + '</div></div>';
  div.addEventListener('click', () => openModal(i));
  grid.appendChild(div);
});
function openModal(i) {
  const p = PROJECTS[i];
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalCat').textContent = p.category;
  document.getElementById('modalImages').innerHTML = p.images.map(img => '<img src="' + img + '" loading="lazy">').join('');
  document.getElementById('modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeModal() { document.getElementById('modal').classList.remove('active'); document.body.style.overflow = ''; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
const observer = new IntersectionObserver(entries => { entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }); }, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
</body>
</html>
