<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>明工作室 | MING STUDIO</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#faf9f7;--fg:#1a1a1a;--gold:#c9a962;--muted:#888;--border:#e8e8e8}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--fg);overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border)}
.loader{position:fixed;inset:0;background:var(--fg);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.8s,visibility 0.8s}
.loader.hidden{opacity:0;visibility:hidden;pointer-events:none}
.loader-text{font-family:'Cormorant Garamond',serif;font-size:3rem;color:var(--gold);letter-spacing:0.3em;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.nav{position:fixed;top:0;left:0;right:0;padding:2rem 4rem;display:flex;justify-content:space-between;align-items:center;z-index:100;mix-blend-mode:difference}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.1rem;letter-spacing:0.25em;color:#fff;text-decoration:none}
.nav-links{display:flex;gap:2rem}
.nav-links a{color:#fff;text-decoration:none;font-size:0.8rem;letter-spacing:0.15em;opacity:0.7;transition:opacity 0.3s}
.nav-links a:hover{opacity:1}
.hero{height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 4rem 6rem;background:var(--fg);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 80%,rgba(201,169,98,0.08) 0%,transparent 60%)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(4rem,15vw,12rem);font-weight:300;line-height:0.9;color:#fff;opacity:0;transform:translateY(60px);animation:up 1.2s cubic-bezier(0.16,1,0.3,1) forwards 0.3s}
.hero-en{font-size:clamp(1rem,3vw,2rem);font-family:'Cormorant Garamond',serif;color:var(--gold);letter-spacing:0.3em;font-weight:300;opacity:0;animation:up 1s ease forwards 0.7s}
.hero-desc{font-size:0.8rem;color:rgba(255,255,255,0.4);letter-spacing:0.25em;margin-top:1.5rem;opacity:0;animation:up 1s ease forwards 1s}
@keyframes up{to{opacity:1;transform:translateY(0)}}
.works{padding:8rem 4rem}
.sec-label{font-size:0.7rem;letter-spacing:0.35em;color:var(--muted);text-transform:uppercase;margin-bottom:0.8rem}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:300;margin-bottom:4rem;line-height:1.1}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:1.5rem}
.item{position:relative;overflow:hidden;cursor:pointer;background:#111}
.item:nth-child(1){grid-column:span 7;aspect-ratio:16/10}
.item:nth-child(2){grid-column:span 5;aspect-ratio:4/5}
.item:nth-child(3){grid-column:span 5;aspect-ratio:4/5}
.item:nth-child(4){grid-column:span 7;aspect-ratio:16/10}
.item:nth-child(5){grid-column:span 12;aspect-ratio:21/9}
.item:nth-child(n+6){grid-column:span 6;aspect-ratio:4/3}
.item img{width:100%;height:100%;object-fit:cover;transition:transform 0.9s cubic-bezier(0.16,1,0.3,1);display:block}
.item:hover img{transform:scale(1.07)}
.item-info{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,transparent 55%);opacity:0;transition:opacity 0.4s;display:flex;flex-direction:column;justify-content:flex-end;padding:2rem}
.item:hover .item-info{opacity:1}
.item-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:#fff;transform:translateY(12px);transition:transform 0.4s}
.item:hover .item-title{transform:translateY(0)}
.item-cat{font-size:0.7rem;letter-spacing:0.2em;color:var(--gold);margin-top:0.3rem;transform:translateY(12px);transition:transform 0.4s 0.05s}
.item:hover .item-cat{transform:translateY(0)}
.modal{position:fixed;inset:0;z-index:1000;opacity:0;visibility:hidden;transition:all 0.35s ease}
.modal.open{opacity:1;visibility:visible}
.modal-bg{position:absolute;inset:0;background:rgba(5,5,5,0.97)}
.modal-wrap{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column}
.modal-top{padding:1.5rem 3rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.08)}
.modal-name{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:#fff}
.modal-tag{font-size:0.7rem;letter-spacing:0.2em;color:var(--gold);margin-bottom:0.3rem}
.modal-x{width:44px;height:44px;border:1px solid rgba(255,255,255,0.2);border-radius:50%;background:none;color:#fff;font-size:1rem;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-x:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.4)}
.modal-scroll{flex:1;overflow-y:auto;padding:2.5rem 3rem}
.modal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.modal-grid img{width:100%;height:240px;object-fit:cover;display:block;transition:transform 0.3s;cursor:zoom-in}
.modal-grid img:hover{transform:scale(1.02)}
.lightbox{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.98);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all 0.3s}
.lightbox.open{opacity:1;visibility:visible}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain}
.lightbox-x{position:absolute;top:2rem;right:2rem;width:44px;height:44px;border:1px solid rgba(255,255,255,0.3);border-radius:50%;background:none;color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.footer{background:var(--fg);padding:5rem 4rem;text-align:center}
.footer-logo{font-family:'Cormorant Garamond',serif;font-size:3rem;letter-spacing:0.2em;color:var(--gold);margin-bottom:1rem}
.footer-line{width:40px;height:1px;background:rgba(255,255,255,0.2);margin:1.5rem auto}
.footer-text{font-size:0.75rem;color:rgba(255,255,255,0.3);letter-spacing:0.15em}
.reveal{opacity:0;transform:translateY(30px);transition:opacity 0.8s ease,transform 0.8s ease}
.reveal.in{opacity:1;transform:none}
@media(max-width:768px){
.nav{padding:1.2rem 1.5rem}
.hero{padding:0 1.5rem 4rem}
.works{padding:4rem 1.5rem}
.grid{grid-template-columns:1fr}
.item:nth-child(n){grid-column:span 1;aspect-ratio:4/3}
.modal-top{padding:1.2rem 1.5rem}
.modal-scroll{padding:1.5rem}
}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="loader-text">MING</div></div>
<nav class="nav">
  <a href="#" class="nav-logo">MING STUDIO</a>
  <div class="nav-links"><a href="#works">作品</a><a href="#footer">关于</a></div>
</nav>
<section class="hero">
  <div class="hero-title">明工作室</div>
  <div class="hero-en">MING STUDIO</div>
  <div class="hero-desc">平面设计 &nbsp;·&nbsp; 摄影 &nbsp;·&nbsp; 视觉创意</div>
</section>
<section class="works" id="works">
  <div class="reveal"><div class="sec-label">Selected Works</div><div class="sec-title">精选作品</div></div>
  <div class="grid" id="grid"></div>
</section>
<footer class="footer" id="footer">
  <div class="footer-logo">MING</div>
  <div class="footer-line"></div>
  <div class="footer-text">© 2024 明工作室 &nbsp;·&nbsp; All Rights Reserved</div>
</footer>
<div class="modal" id="modal">
  <div class="modal-bg" onclick="closeModal()"></div>
  <div class="modal-wrap">
    <div class="modal-top">
      <div><div class="modal-tag" id="mTag"></div><div class="modal-name" id="mName"></div></div>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-scroll"><div class="modal-grid" id="mGrid"></div></div>
  </div>
</div>
<div class="lightbox" id="lb" onclick="closeLb()">
  <img id="lbImg" src="">
  <button class="lightbox-x" onclick="closeLb()">✕</button>
</div>
<script>
const P = [{"id": "photography", "title": "摄影", "category": "摄影", "cover": "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/photography/001.jpg", "images": ["https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/photography/001.jpg", "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/photography/002.jpg", "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/photography/003.jpg", "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/photography/004.jpg", "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/photography/005.jpg", "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/photography/006.jpg"]}, {"id": "wooden-dog", "title": "木制拖拉小狗", "category": "平面设计", "cover": "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/wooden-dog/002.jpg", "images": ["https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/wooden-dog/002.jpg", "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/wooden-dog/004.jpg", "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/wooden-dog/005.jpg", "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/wooden-dog/006.jpg"]}, {"id": "frog-mug", "title": "青蛙马克杯", "category": "平面设计", "cover": "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/frog-mug/001.jpg", "images": ["https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/frog-mug/001.jpg", "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/frog-mug/002.jpg", "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/frog-mug/003.jpg", "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/frog-mug/005.jpg"]}, {"id": "jishe-a", "title": "鸡舍A+", "category": "平面设计", "cover": "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/jishe-a/001.jpg", "images": ["https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/jishe-a/001.jpg", "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/jishe-a/002.jpg", "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/jishe-a/003.jpg", "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/jishe-a/004.jpg", "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/jishe-a/005.jpg", "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/jishe-a/006.jpg", "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/jishe-a/007.jpg", "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/jishe-a/008.jpg", "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/jishe-a/009.jpg", "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/jishe-a/010.jpg"]}, {"id": "jishe-long", "title": "鸡舍长图", "category": "平面设计", "cover": "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/jishe-long/001.jpg", "images": ["https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/jishe-long/001.jpg"]}, {"id": "frog-cup", "title": "青蛙杯", "category": "平面设计", "cover": "https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/frog-cup/001.jpg", "images": ["https://cdn.jsdelivr.net/gh/z1832698917/ming-studio-pro@main/imgs/frog-cup/001.jpg"]}];
window.addEventListener('load',()=>{setTimeout(()=>document.getElementById('loader').classList.add('hidden'),1000)});
const grid=document.getElementById('grid');
P.forEach((p,i)=>{
  const d=document.createElement('div');
  d.className='item reveal';
  d.innerHTML='<img src="'+p.cover+'" alt="'+p.title+'" loading="lazy"><div class="item-info"><div class="item-title">'+p.title+'</div><div class="item-cat">'+p.category+'</div></div>';
  d.onclick=()=>openModal(i);
  grid.appendChild(d);
});
function openModal(i){
  const p=P[i];
  document.getElementById('mName').textContent=p.title;
  document.getElementById('mTag').textContent=p.category;
  document.getElementById('mGrid').innerHTML=p.images.map(u=>'<img src="'+u+'" loading="lazy" onclick="openLb(''+u+'')">').join('');
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('modal').classList.remove('open');document.body.style.overflow='';}
function openLb(u){document.getElementById('lbImg').src=u;document.getElementById('lb').classList.add('open');}
function closeLb(){document.getElementById('lb').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeLb();}});
const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in')})},{threshold:0.1});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
</script>
</body>
</html>
